  category: ticker
  expected_doc_ids:
    - "doc_petr4_div_2025"
  expected_terms:
    - "PETR4"
    - "janela Atlas"
    - "dividendos extraordinários"
  notes: >
    Exige recuperar o documento local com ticker exato e marcador sintético.

