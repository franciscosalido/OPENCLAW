# Benchmark Financeiro BR v0 — Sprint RAG-1A / PR 01 / RC-1
# Contract only: no retrieval, embeddings, Qdrant or portfolio data.
# RC-1 rule: every query is anchored to a synthetic local corpus detail so it
# cannot be answered reliably from parametric model knowledge alone.

