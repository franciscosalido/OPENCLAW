# RAG Pipeline Configuration — OPENCLAW RAG-0
# All runtime values live here. Never hardcode in Python files.

rag:
  chunking:
    max_tokens: 400
    overlap_tokens: 80
    split_strategy: "paragraph_then_sentence"

  embedding:
    active_backend: "gateway_litellm"
    model: "nomic-embed-text"
    endpoint: "http://localhost:11434"
    timeout_seconds: 30
    batch_size: 10
    max_retries: 3
    backoff_seconds: 1.0
    max_concurrency: 4
    expected_dimensions: 768
    embedding_contract: "openai_compatible_v1_embeddings"
    embedding_alias: "quimera_embed"
    gateway_embedding_alias: "quimera_embed"
    gateway_compatibility_alias: "local_embed"
    gateway_embedding_status: "controlled_migration_current"
    embedding_backend: "gateway_litellm_current"
    legacy_embedding_backend: "direct_ollama"
    embedding_provider: "ollama"
    embedding_model: "nomic-embed-text"
    embedding_dimensions: 768
    embedding_version: "local-ollama-current"
    reindex_required_on_model_change: true

  qdrant:
    host: "localhost"
    port: 6333
    grpc_port: 6334
    collection: "openclaw_knowledge"
    vector_size: 768
    distance: "Cosine"

  tracing:
    enabled: true
    log_level: "INFO"

  observability:
    enabled: true
    log_level: "INFO"
    embedding_events_enabled: true
    retrieval_events_enabled: true
    generation_events_enabled: true
    collection_guard_events_enabled: true

  retrieval:
    top_k: 5
    score_threshold: 0.3
    max_context_tokens: 8000
    dedup_similarity_threshold: 0.92

  context_budget:
    enabled: false
    max_context_chunks: 3
    mode: "whole_chunks"
    apply_to_aliases:
      - "local_rag"

  generation_budget:
    # G2-03 is validated only for local_rag with thinking_mode=false.
    # Do not enable this budget for thinking aliases: Qwen3 reasoning tokens can
    # consume the same max_tokens/num_predict budget before final answer tokens.
    enabled: false
    apply_to_aliases:
      - "local_rag"
    max_tokens: 768
    enforce_conciseness: false
    target_sentences_min: 3
    target_sentences_max: 6

  model_residency:
    # G2-05 local_rag-only Ollama keep_alive hint.
    # Disabled by default. "0" is an explicit unload-after-request rollback
    # value; "-1" keeps the model resident indefinitely and should be used
    # cautiously on memory-constrained machines.
    enabled: false
    apply_to_aliases:
      - "local_rag"
    keep_alive: "5m"

  generation:
    model: "local_rag"
    reasoning_model: "local_think"
    json_model: "local_json"
    endpoint: "http://127.0.0.1:4000/v1"
    # api_key read from env: QUIMERA_LLM_API_KEY (not loaded from YAML — set via shell export)
    temperature: 0.2
    max_tokens: 2048
    thinking_mode: false  # /no_think by default for factual RAG
    stream: false         # simplified for V1

  system_prompt: |
    You are the local assistant for OPENCLAW.
    Answer ONLY based on the RETRIEVED CONTEXT provided.
    Do not use external knowledge for specific facts.
    If the context does not support the answer, say:
    "Não há contexto local suficiente para responder com segurança."
    Cite sources in the format [doc_id#chunk_index].
    For calculations, use deterministic Python logic.
    Never request or reveal real portfolio data, credentials, or private documents.

gateway:
  routing:
    remote_enabled: false
    default_route: "local"
    log_decisions: true
    decision_log_path: "logs/routing_decisions"
    decision_log_rotate_daily: true
    # allow_remote_candidates records planning metadata only.
    # Enabling remote execution requires a future accepted ADR.
    allow_remote_candidates: true
    allowed_remote_providers: []
    per_request_token_limit: 0
    blocked_task_types:
      - "trade_execution"
      - "brokerage_login"
    allowed_task_types: []
    token_estimation:
      chars_per_token: 4
      min_tokens: 1

agent0:
  domain_routing:
    retrieval_score_min: 0.75
    escalate_to_think_below: 0.45
    p95_routing_budget_ms: 100.0
    citation_weight: 0.2
    domain_rules:
      internal:
        corpus: "internal"
        collection_name: "openclaw_internal"
        keywords:
          - "gw-07"
          - "gateway"
          - "alias"
          - "aliases"
          - "claude"
          - "current_state"
          - "decisions"
          - "timeout"
        regex:
          - "\\bgw-?\\d+\\b"
      macroeconomia:
        corpus: "financial"
        collection_name: "openclaw_financial"
        keywords:
          - "selic"
          - "inflacao"
          - "inflação"
          - "cambio"
          - "câmbio"
          - "juros"
          - "ipca"
          - "macroeconomia"
          - "politica monetaria"
          - "política monetária"
          - "ciclo de juros"
          - "balanco de riscos"
          - "balanço de riscos"
          - "risco macroeconomico"
          - "risco macroeconômico"
          - "expectativas macro"
          - "expectativas ficticias"
          - "expectativas fictícias"
        regex:
          - "\\b(ipca|selic|macro|macroeconomico|macroeconômico)\\b"
      renda_fixa:
        corpus: "financial"
        collection_name: "openclaw_financial"
        keywords:
          - "duration"
          - "renda fixa"
          - "prefixado"
          - "pos-fixado"
          - "pós-fixado"
          - "credito privado"
          - "crédito privado"
          - "curva de juros"
          - "liquidez em renda fixa"
          - "mercado secundario"
          - "mercado secundário"
          - "premio de liquidez"
          - "prêmio de liquidez"
          - "risco de credito"
          - "risco de crédito"
          - "covenants"
        regex:
          - "\\b(duration|covenants?|liquidez|credito|crédito)\\b"
      valuation:
        corpus: "financial"
        collection_name: "openclaw_financial"
        keywords:
          - "valuation"
          - "ebitda"
          - "fluxo de caixa"
          - "multiplo"
          - "múltiplo"
          - "margem de seguranca"
          - "margem de segurança"
          - "crescimento em valuation"
          - "custo de capital"
          - "taxa de desconto"
          - "cenarios de valuation"
          - "cenários de valuation"
          - "ativo ficticio"
          - "ativo fictício"
        regex:
          - "\\b(ebitda|valuation|wacc|capital|desconto)\\b"
