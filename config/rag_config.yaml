# RAG Pipeline Configuration — OPENCLAW RAG-0
# All runtime values live here. Never hardcode in Python files.

rag:
  chunking:
    max_tokens: 400
    overlap_tokens: 80
    split_strategy: "paragraph_then_sentence"

  embedding:
    active_backend: "gateway_litellm"
    model: "nomic-embed-text"
    endpoint: "http://localhost:11434"
    timeout_seconds: 30
    batch_size: 10
    max_retries: 3
    backoff_seconds: 1.0
    max_concurrency: 4
    expected_dimensions: 768
    embedding_contract: "openai_compatible_v1_embeddings"
    embedding_alias: "quimera_embed"
    gateway_embedding_alias: "quimera_embed"
    gateway_compatibility_alias: "local_embed"
    gateway_embedding_status: "controlled_migration_current"
    embedding_backend: "gateway_litellm_current"
    legacy_embedding_backend: "direct_ollama"
    embedding_provider: "ollama"
    embedding_model: "nomic-embed-text"
    embedding_dimensions: 768
    embedding_version: "local-ollama-current"
    reindex_required_on_model_change: true

  qdrant:
    host: "localhost"
    port: 6333
    grpc_port: 6334
    collection: "openclaw_knowledge"
    vector_size: 768
    distance: "Cosine"

  tracing:
    enabled: true
    log_level: "INFO"

  retrieval:
    top_k: 5
    score_threshold: 0.3
    max_context_tokens: 8000
    dedup_similarity_threshold: 0.92

  generation:
    model: "local_rag"
    reasoning_model: "local_think"
    json_model: "local_json"
    endpoint: "http://127.0.0.1:4000/v1"
    # api_key read from env: QUIMERA_LLM_API_KEY (not loaded from YAML — set via shell export)
    temperature: 0.2
    max_tokens: 2048
    thinking_mode: false  # /no_think by default for factual RAG
    stream: false         # simplified for V1

  system_prompt: |
    You are the local assistant for OPENCLAW.
    Answer ONLY based on the RETRIEVED CONTEXT provided.
    Do not use external knowledge for specific facts.
    If the context does not support the answer, say:
    "Não há contexto local suficiente para responder com segurança."
    Cite sources in the format [doc_id#chunk_index].
    For calculations, use deterministic Python logic.
    Never request or reveal real portfolio data, credentials, or private documents.
